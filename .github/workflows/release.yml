name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Run tests
        run: pytest tests/ -q
        env:
          PYTHONPATH: .

      - name: Build portable app
        run: pyinstaller packaging/bpmind.spec --noconfirm

      - name: Create zip archive
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/BPMind Auto Mixer" -DestinationPath "dist/BPMind-Auto-Mixer-Windows-portable.zip" -Force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/BPMind-Auto-Mixer-Windows-portable.zip
